[theme]
base = "light"
primaryColor = "#D2691E"        # chocolate brown — buttons, sliders, accents
backgroundColor = "#FFF8F0"     # warm off-white — main background
secondaryBackgroundColor = "#F5E6D3"  # light tan — sidebar & card backgrounds
textColor = "#3B2A1A"           # dark espresso — body text
font = "sans serif"
